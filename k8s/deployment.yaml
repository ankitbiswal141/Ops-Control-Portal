apiVersion: apps/v1
kind: Deployment
metadata:
  name: ops-portal-backend
  labels:
    app: ops-portal-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ops-portal-backend
  template:
    metadata:
      labels:
        app: ops-portal-backend
    spec:
      containers:
      - name: backend
        image: ankitbiswal/ops-backend:366fe58293038d7e6b174351cfa39dfdd0b7a7a5
        ports:
        - containerPort: 8000
        envFrom:
        - secretRef:
            name: argo-secrets
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ops-portal-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ops-portal-frontend
  template:
    metadata:
      labels:
        app: ops-portal-frontend
    spec:
      containers:
      - name: frontend
        image: ankitbiswal/ops-frontend:366fe58293038d7e6b174351cfa39dfdd0b7a7a5
        ports:
        - containerPort: 80