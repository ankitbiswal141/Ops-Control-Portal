apiVersion: v1
kind: Service
metadata:
  name: backend-service
spec:
  selector:
    app: ops-portal-backend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
spec:
  type: LoadBalancer
  selector:
    app: ops-portal-frontend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80