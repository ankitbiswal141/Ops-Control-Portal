apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ops-control-system
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/your-username/ops-control-portal.git
    targetRevision: HEAD
    path: k8s/  
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true