services:
  frontend:
    build:
      context: ./frontend/main-page
      dockerfile: Dockerfile
    ports:
      - "80:80"
    networks:
      - portal-network
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    networks:
      - portal-network

networks:
  portal-network:
    driver: bridge