name: "Production Pipeline"

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # 0. Quality & Security Gate
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Verify Terraform syntax
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: Terraform Init & Validate
        run: |
          cd terraform
          terraform init -backend=false -upgrade
          terraform validate

      # Security Scan of the source code
      - name: Run Trivy Security Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          ignore-unfixed: true
          severity: 'CRITICAL,HIGH'

  # 1. Frontend Build & Push
  build-frontend:
    needs: [validate]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend/main-page
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/ops-frontend:${{ github.sha }}

          cache-from: type=gha
          cache-to: type=gha,mode=max

  # 2. Backend Build & Push
  build-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/ops-backend:${{ github.sha }}

          cache-from: type=gha
          cache-to: type=gha,mode=max

  # 3. Infrastructure Deployment
  terraform-deploy:
    needs: [validate] # Only runs if linting/security passes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: Terraform Init
        run: cd terraform && terraform init -backend=false -upgrade

      - name: Terraform Apply
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: cd terraform && terraform apply -auto-approve
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          TF_VAR_argo_token: ${{ secrets.ARGO_TOKEN }}

  # 3. GitOps Trigger (Update K8s Manifests)
  update-manifests:
    needs: [build-frontend, build-backend, terraform-deploy]
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Allow writing to repository contents
    steps:
      - uses: actions/checkout@v4
      
      - name: Update Image Tags in K8s Manifests
        run: |
          sed -i "s|image: .*/ops-frontend:.*|image: ${{ secrets.DOCKERHUB_USERNAME }}/ops-frontend:${{ github.sha }}|g" k8s/deployment.yaml
          sed -i "s|image: .*/ops-backend:.*|image: ${{ secrets.DOCKERHUB_USERNAME }}/ops-backend:${{ github.sha }}|g" k8s/deployment.yaml
          
      - name: Commit and Push Changes
        run: |
          git config --global user.name "GitOps Bot"
          git config --global user.email "bot@ops-control.com"
          git pull origin main --rebase # <--- ADD THIS to prevent push conflicts
          git add k8s/deployment.yaml
          git commit -m "chore: update image tags to ${{ github.sha }} [skip ci]" || echo "No changes to commit"
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:main