name: "1. Infrastructure (EKS & ArgoCD)"
on:
  push:
    branches: [ main ]
    paths: ['terraform/**']
  workflow_dispatch:

jobs:
  terraform:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-2

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: Terraform Apply
        id: apply
        run: |
          cd terraform
          terraform init
          terraform apply -auto-approve
        env:
          TF_VAR_argo_token: ${{ secrets.ARGO_TOKEN }}

      - name: Export ArgoCD Access Info
        if: success()
        run: |
          aws eks update-kubeconfig --region us-east-2 --name $(cd terraform && terraform output -raw cluster_name)
          sleep 20
          echo "---------------------------------------------------"
          # ... rest of your echo commands
          # Retrieve the ArgoCD LoadBalancer Hostname
          export ARGOCD_HOST=$(kubectl get svc argocd-server -n argocd -o jsonpath='{.status.loadBalancer.ingress[0].hostname}')
          
          # Decode the initial administrative password
          export ARGOCD_PASSWORD=$(kubectl -n argocd get secret argocd-initial-admin-secret -o jsonpath="{.data.password}" | base64 -d)
          
          # Output metadata to the workflow log for administrative access
          echo "================ DEPLOYMENT SUMMARY ================"
          echo "ArgoCD Access URL: http://$ARGOCD_HOST"
          echo "Admin Username:    admin"
          echo "Initial Password:  $ARGOCD_PASSWORD"
          echo "===================================================="

        working-directory: terraform