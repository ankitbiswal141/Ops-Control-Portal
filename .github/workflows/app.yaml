name: "2. App Build & GitOps Sync"
on:
  push:
    branches: [ main ]
    paths: ['frontend/**', 'backend/**', 'deployments/cloud/**']

  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      sha: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v4
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/ops-backend:${{ github.sha }}

      - name: Build & Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend/main-page
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/ops-frontend:${{ github.sha }}

  update-manifests:
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions: { contents: write }
    steps:
      - uses: actions/checkout@v4
      - name: Update Image Tags
        run: |
          sed -i "s|image: .*/ops-backend:.*|image: ${{ secrets.DOCKERHUB_USERNAME }}/ops-backend:${{ github.sha }}|g" deployments/cloud/app-stack.yaml
          sed -i "s|image: .*/ops-frontend:.*|image: ${{ secrets.DOCKERHUB_USERNAME }}/ops-frontend:${{ github.sha }}|g" deployments/cloud/app-stack.yaml
          
      - name: GitOps Manifests
        run: |
          TARGET_FILE="deployment/cloud/deployment.yaml"
          
          # This specifically replaces the image line with the new SHA tag
          sed -i "s|image: .*/ops-backend:.*|image: ${{ secrets.DOCKER_USERNAME }}/ops-backend:${{ github.sha }}|g" $TARGET_FILE
          
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          git add $TARGET_FILE
          git commit -m "chore: update backend image to ${{ github.sha }} [skip ci]"
          git push